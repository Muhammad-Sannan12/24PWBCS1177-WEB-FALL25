<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holy Grail Layout Comparison</title>

<style>

/* General Styling */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

header, footer{
background:#333;
color:white;
text-align:center;
padding:15px;
}

section{
margin-bottom:50px;
border:2px solid #ddd;
}

nav, aside{
background:#f4f4f4;
padding:15px;
}

main{
padding:15px;
background:#fafafa;
}

/* ------------------------- */
/* 1. FLOAT IMPLEMENTATION */
/* ------------------------- */

.float-container{
overflow:hidden;
}

.float-left{
float:left;
width:20%;
}

.float-main{
float:left;
width:60%;
}

.float-right{
float:right;
width:20%;
}

/* Responsive Float */

@media(max-width:768px){

.float-left,
.float-main,
.float-right{
float:none;
width:100%;
}

}

/* ------------------------- */
/* 2. FLEXBOX IMPLEMENTATION */
/* ------------------------- */

.flex-container{
display:flex;
flex-direction:column;
}

/* Mobile First */

@media(min-width:768px){

.flex-container{
flex-direction:row;
}

.flex-container nav{
flex:1;
}

.flex-container main{
flex:3;
}

.flex-container aside{
flex:1;
}

}

/* ------------------------- */
/* 3. GRID IMPLEMENTATION */
/* ------------------------- */

.grid-container{
display:grid;
grid-template-areas:
"header"
"nav"
"main"
"aside"
"footer";
}

.grid-header{grid-area:header;}
.grid-nav{grid-area:nav;}
.grid-main{grid-area:main;}
.grid-aside{grid-area:aside;}
.grid-footer{grid-area:footer;}

@media(min-width:768px){

.grid-container{
grid-template-columns:1fr 3fr 1fr;
grid-template-areas:
"header header header"
"nav main aside"
"footer footer footer";
}

}

</style>
</head>

<body>

<!-- FLOAT LAYOUT -->

<section>

<header>Float Layout Header</header>

<div class="float-container">

<nav class="float-left">Left Sidebar</nav>

<main class="float-main">Main Content</main>

<aside class="float-right">Right Sidebar</aside>

</div>

<footer>Float Layout Footer</footer>

</section>



<!-- FLEXBOX LAYOUT -->

<section>

<header>Flexbox Layout Header</header>

<div class="flex-container">

<nav>Left Sidebar</nav>

<main>Main Content</main>

<aside>Right Sidebar</aside>

</div>

<footer>Flexbox Layout Footer</footer>

</section>



<!-- GRID LAYOUT -->

<section class="grid-container">

<header class="grid-header">Grid Header</header>

<nav class="grid-nav">Left Sidebar</nav>

<main class="grid-main">Main Content</main>

<aside class="grid-aside">Right Sidebar</aside>

<footer class="grid-footer">Grid Footer</footer>

</section>


</body>
</html>
