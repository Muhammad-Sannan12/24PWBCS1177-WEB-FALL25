<!DOCTYPE html>
<html>
<head>
<title>CSS Position Demo</title>

<link rel="stylesheet" href="../styles/grid.css">
</head>

<body>

<h2>1. Static Position</h2>
<div class="box static-box">Static Position</div>

<h2>2. Relative Position</h2>
<div class="box relative-box">Relative Position</div>

<h2>3. Absolute Position</h2>
<div class="container">
    Container (Relative Parent)
    <div class="box absolute-box">Absolute Box</div>
</div>

<h2>4. Fixed Position</h2>
<div class="box fixed-box">Fixed Box</div>

<h2>5. Sticky Position</h2>
<div class="box sticky-box">Sticky Header</div>

<p>Scroll the page to see the sticky and fixed effects.</p>

</body>
</html>
